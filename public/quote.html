<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Processing Quote</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f6f7fb;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
margin-bottom:20px;
}

.row{
margin-bottom:15px;
font-size:18px;
}

.value{
font-weight:bold;
}

button{
margin-top:30px;
padding:12px 20px;
background:#16a34a;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#15803d;
}

</style>

</head>

<body>

<div class="container">

<h1>Payment Processing Quote</h1>

<div class="row">
Merchant:
<span id="merchantName" class="value"></span>
</div>

<div class="row">
Rate:
<span id="rate" class="value"></span>
</div>

<div class="row">
Per Transaction Fee:
<span id="fixedFee" class="value"></span>
</div>

<button onclick="acceptQuote()">
Accept Quote
</button>

</div>


<script>

function getParam(name){
const params = new URLSearchParams(window.location.search);
return params.get(name);
}

function loadQuote(){

const merchant = getParam("merchant");
const rate = getParam("rate");
const fee = getParam("fee");

if(!merchant){
document.body.innerHTML = "Quote not found.";
return;
}

document.getElementById("merchantName").innerText = merchant;
document.getElementById("rate").innerText = rate + "%";
document.getElementById("fixedFee").innerText = fee + "p";

}

function acceptQuote(){

const merchant = getParam("merchant");

alert("Quote accepted by " + merchant);

}

window.onload = loadQuote;

</script>

</body>
</html>
